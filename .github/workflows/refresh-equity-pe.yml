name: refresh-equity-pe

on:
  schedule:
    - cron: '0 14 * * 0'   # Sundays 14:00 UTC = 10:00 ET
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Refresh equity P/E data
        run: node scripts/refresh-equity-pe.mjs

      - name: Commit if changed
        run: |
          git config user.name  "siberforge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A core/equity/pe/data
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: weekly equity-pe refresh $(date -u +%F)"
            git push
          fi
