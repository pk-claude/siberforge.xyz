<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Siberforge &mdash; Page not found</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.ico" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<link rel="stylesheet" href="/core/lib/tokens.css" />
<link rel="stylesheet" href="/core/lib/layout.css" />
<script src="/core/lib/theme-toggle.js"></script>
<style>
  .nf-wrap {
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    font-family: Inter, system-ui, sans-serif;
    color: var(--text);
  }
  .nf-code {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--accent);
    margin: 0;
  }
  .nf-msg {
    font-size: 16px;
    color: var(--muted);
    margin: 12px 0 28px;
  }
  .nf-home {
    display: inline-block;
    padding: 10px 22px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }
  .nf-home:hover { border-color: var(--accent); }
</style>
</head>
<body>
<main class="nf-wrap">
  <h1 class="nf-code">404</h1>
  <p class="nf-msg">This page doesn't exist. The scent trail went cold.</p>
  <a class="nf-home" href="/">Back to the hub</a>
</main>
</body>
