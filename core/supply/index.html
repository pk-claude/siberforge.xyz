<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Siberforge &mdash; Supply Chain Dashboard</title>
  <meta name="description" content="Distribution-center, middle-mile, last-mile and international supply-chain indicators with deep-dive views.">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="/core/lib/tokens.css" />
<link rel="stylesheet" href="/core/lib/layout.css" />
<script src="/core/lib/theme-toggle.js"></script>
<script src="/core/lib/nav-config.js"></script>
<script defer src="/core/lib/layout.js"></script>
</head>
<body data-page="overview" data-section="supply" data-page="supply-overview" data-page-sub="Supply Chain Dashboard" data-page-status-text="Initializing…">
  <div id="calendar-strip-host"></div>
  <div id="watch-band-host"></div>
  <div id="environment-summary-host" class="env-summary"></div>
  <div class="quadrants">
    <div class="quadrant">
      <h2><span class="accent" style="background:#3b82f6;"></span>Distribution Center</h2>
      <div class="kpi-grid" id="grid-dc"></div>
      <a class="open-link" href="./dc/">Open deep dive →</a>
    </div>
    <div class="quadrant">
      <h2><span class="accent" style="background:#10b981;"></span>Middle Mile</h2>
      <div class="kpi-grid" id="grid-middle-mile"></div>
      <a class="open-link" href="./middle-mile/">Open deep dive →</a>
    </div>
    <div class="quadrant">
      <h2><span class="accent" style="background:#f59e0b;"></span>Last Mile</h2>
      <div class="kpi-grid" id="grid-last-mile"></div>
      <a class="open-link" href="./last-mile/">Open deep dive →</a>
    </div>
    <div class="quadrant">
      <h2><span class="accent" style="background:#ef4444;"></span>International / Sourcing</h2>
      <div class="kpi-grid" id="grid-international"></div>
      <a class="open-link" href="./international/">Open deep dive →</a>
    </div>
  </div>
  <script type="module" src="./dashboard.js"></script>
<script src="../lib/theme-toggle.js"></script>
</body>
</html>
